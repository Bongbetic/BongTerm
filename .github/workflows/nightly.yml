name: nightly
on:
  schedule:
    # 07:00 UTC daily. Phase exit gates must be green for 7 consecutive runs.
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  gates:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt,clippy

      # Phase 2 exit gates (spec §6.1 #15, #24).
      - name: Gate 15 — agent launch + transcript capture
        run: cargo test -p bongterm-agents --test gate15
      - name: Gate 24 — prompt-injection corpus
        run: cargo run -p xtask -- prompt-injection-corpus

      # Phase 1 exit gates (spec §6.1) — measurable subset of Task 1.exit.
      # BLOCKED on renderer/subsystem integration + a GPU/display (NOT faked
      # here — see docs/phase1-exit-gates.md): #4 cold-start, #5 full-app
      # RSS + VRAM, #6 idle CPU, #7 panes, #17 dashboard. NOTE: the Gate 5 step
      # below is only a headless engine-core lower-bound tripwire — it does NOT
      # spin up the window/wgpu/render loop, so it does NOT verify the full-app
      # 120 MB budget (which is dominated by the renderer). Re-measure when the
      # renderer is wired into bongterm-app.
      - name: Gate 1 — shell profiles launch (absent profiles skipped + logged)
        run: cargo test -p bongterm-app --test gate01_shell_smoke -- --nocapture
      - name: Gate 5 (RSS, PARTIAL) — headless engine-core RSS lower-bound tripwire
        run: cargo test -p bongterm-app --test gate05_rss -- --nocapture
      - name: Gate 8 — command blocks (fixture corpus replay + detection latency p99 ≤ 5 ms)
        run: cargo test -p bongterm-blocks -- --nocapture
      - name: Gate 28 — settings load + validation failure + backup + Safe Mode + migration
        run: cargo test -p bongterm-settings --test gate28_settings_recovery -- --nocapture
      - name: Gate 29 — SQLite + sidecar recovery (torn / checksum / corrupt DB)
        run: cargo test -p bongterm-storage-sqlite --test gate29_storage_recovery_suite -- --nocapture
