name: nightly
on:
  schedule:
    # 07:00 UTC daily. Phase exit gates must be green for 7 consecutive runs.
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  gates:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust 1.95
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"
          components: rustfmt,clippy

      # Phase 2 exit gates (spec §6.1 #15, #24).
      - name: Gate 15 — agent launch + transcript capture
        run: cargo test -p bongterm-agents --test gate15
      - name: Gate 24 — prompt-injection corpus
        run: cargo run -p xtask -- prompt-injection-corpus

      # Phase 1 exit gates (spec §6.1) — measurable subset of Task 1.exit.
      # The remaining Phase-1 gates (#4 cold-start, #5 VRAM, #6 idle CPU, #7
      # panes, #17 dashboard) are BLOCKED on renderer/subsystem integration +
      # a GPU/display and are NOT faked here — see docs/phase1-exit-gates.md.
      - name: Gate 1 — shell profiles launch (absent profiles skipped + logged)
        run: cargo test -p bongterm-app --test gate01_shell_smoke -- --nocapture
      - name: Gate 5 (RSS) — core process RSS within 120 MB budget
        run: cargo test -p bongterm-app --test gate05_rss -- --nocapture
      - name: Gate 8 — command blocks (fixture corpus replay + detection latency p99 ≤ 5 ms)
        run: cargo test -p bongterm-blocks -- --nocapture
      - name: Gate 29 — SQLite + sidecar recovery (torn / checksum / corrupt DB)
        run: cargo test -p bongterm-storage-sqlite --test gate29_storage_recovery_suite -- --nocapture
