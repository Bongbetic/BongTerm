# cargo-deny configuration — runs in CI to enforce license + source + advisory policy.

[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # `serial` 0.4.0 unmaintained — transitive dep via portable-pty (Phase 0 PTY stub).
    # portable-pty is replaced by real ConPTY in Phase 1.B; remove this ignore then.
    { id = "RUSTSEC-2017-0008", reason = "transitive via portable-pty; replaced in Phase 1.B" },
    # `paste` — dtolnay stated as no longer maintained but stable; widely depended upon.
    { id = "RUSTSEC-2024-0436", reason = "paste macro stable; no active vulnerability" },
    # `adler` 1.0.2 unmaintained — transitive via vendored wezterm-term -> miniz_oxide 0.4.4.
    # Not a vulnerability; no safe upgrade (the version is pinned by the vendored wezterm submodule).
    { id = "RUSTSEC-2025-0056", reason = "unmaintained; transitive via vendored wezterm-term -> miniz_oxide; no safe upgrade" },
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    # BSL-1.0 (Boost Software License) — OSI-approved, FSF-Free.
    # Required by clipboard-win + error-code (transitive via portable-pty).
    "BSL-1.0",
    # WTFPL — FSF Free/Libre, maximally permissive (grants unconditional rights, no obligations).
    # Required by terminfo 0.8.0 (transitive via termwiz -> vendored wezterm-term).
    "WTFPL",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
# Path deps to internal workspace crates have no version; treat as warnings.
# External registry wildcards ("some-lib = "*"") are still flagged by deny check.
wildcards = "warn"
highlight = "all"
deny = [
    # GPL/AGPL families banned from core (spec §2.5 / PRD v7 §18).
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
